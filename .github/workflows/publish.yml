name: Publish
on:
  push:
    tags:
      - "v*"
jobs:
  ci:
    uses: ./.github/workflows/ci.yml
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    needs: ci
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build
        run: uv build
      - name: Publish docs
        run: uv run mkdocs gh-deploy --force
      - name: Publish
        run: uv publish
